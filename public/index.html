<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问道MMO - 2D回合制MMORPG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            width: 1280px;
            height: 720px;
            background: #0a0a1e;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 150, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* 登录/注册界面 */
        #auth-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #auth-screen h1 {
            font-size: 3.5em;
            background: linear-gradient(90deg, #ffd700, #ff6b35, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: none;
            animation: titleGlow 3s infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5)); }
            50% { filter: drop-shadow(0 0 30px rgba(255, 107, 53, 0.8)); }
        }

        #auth-screen .subtitle {
            color: #aaa;
            font-size: 1.2em;
            margin-bottom: 40px;
        }

        .auth-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            backdrop-filter: blur(10px);
        }

        .auth-box h2 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 25px;
            font-size: 1.8em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #aaa;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.12);
        }

        .btn-gold {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            margin-bottom: 12px;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }

        .btn-link {
            background: none;
            border: none;
            color: #88f;
            cursor: pointer;
            font-size: 0.9em;
            display: block;
            margin: 0 auto;
            font-family: inherit;
        }

        .btn-link:hover { color: #aaf; }

        .error-msg {
            color: #f44;
            text-align: center;
            margin-bottom: 12px;
            font-size: 0.9em;
        }

        .success-msg {
            color: #4f4;
            text-align: center;
            margin-bottom: 12px;
            font-size: 0.9em;
        }

        /* 门派选择界面 */
        #sect-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 90;
        }

        #sect-screen h2 {
            font-size: 2em;
            color: #ffd700;
            margin-bottom: 30px;
        }

        .sect-grid {
            display: grid;
            grid-template-columns: repeat(5, 150px);
            gap: 20px;
        }

        .sect-card {
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid transparent;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sect-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        .sect-card.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .sect-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .sect-name {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .sect-desc {
            font-size: 0.85em;
            color: #aaa;
        }

        .sect-stats {
            margin-top: 10px;
            font-size: 0.8em;
            color: #ccc;
        }

        /* 主游戏界面 */
        #game-screen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 顶部状态栏 */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.7));
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 10;
            border-bottom: 2px solid #ffd700;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .player-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ff6b35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }

        .player-name {
            font-weight: bold;
            color: #ffd700;
        }

        .player-level {
            background: #e94560;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.85em;
        }

        .resource-bar {
            display: flex;
            gap: 20px;
            margin-left: 40px;
        }

        .resource {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9em;
        }

        .resource .icon { font-size: 1.2em; }

        /* 游戏地图 */
        #game-map {
            width: 100%;
            height: 100%;
            background: #1a3a1a;
            position: relative;
            overflow: hidden;
        }

        .map-tile {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #2a5a2a;
            border: 1px solid #1a4a1a;
        }

        .map-tile.water { background: #1a3a5a; }
        .map-tile.mountain { background: #5a4a3a; }
        .map-tile.tree { background: #1a4a1a; }

        .player-sprite {
            position: absolute;
            width: 40px;
            height: 40px;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 5;
        }

        .npc-sprite {
            position: absolute;
            width: 40px;
            height: 40px;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4;
        }

        /* 底部菜单 */
        #bottom-menu {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.7));
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 10;
            border-top: 2px solid #ffd700;
        }

        .menu-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #16213e, #0f3460);
            border: 2px solid #e94560;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            font-size: 0.95em;
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, #e94560, #c23152);
            transform: translateY(-2px);
        }

        /* 功能面板 */
        .panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            border: 3px solid #ffd700;
            border-radius: 16px;
            padding: 30px;
            z-index: 50;
            display: none;
            max-height: 80%;
            overflow-y: auto;
            min-width: 400px;
        }

        .panel h2 {
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.6em;
        }

        .panel-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e94560;
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 战斗界面 */
        #battle-panel {
            width: 900px;
            min-width: 900px;
        }

        .battle-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: radial-gradient(ellipse at center, #2a1a3a 0%, #1a0a2a 100%);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            min-height: 250px;
        }

        .battle-fighter {
            text-align: center;
        }

        .battle-sprite {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .battle-name {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .battle-hp-bar {
            width: 150px;
            height: 16px;
            background: #333;
            border-radius: 8px;
            overflow: hidden;
            margin: 0 auto;
        }

        .battle-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #44ff44);
            transition: width 0.5s;
        }

        .battle-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .battle-log {
            background: #0a0a1e;
            border-radius: 8px;
            padding: 10px;
            margin-top: 15px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.9em;
        }

        /* 宠物界面 */
        .pet-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .pet-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pet-card:hover { border-color: #ffd700; }
        .pet-card.battle { border-color: #4f4; }

        .pet-icon { font-size: 2.5em; text-align: center; }

        /* 聊天框 */
        #chat-panel {
            width: 500px;
            min-width: 500px;
        }

        .chat-messages {
            background: #0a0a1e;
            border-radius: 8px;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .chat-input-group {
            display: flex;
            gap: 10px;
        }

        .chat-input-group input {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
        }

        /* 在线玩家列表 */
        #online-panel {
            width: 350px;
            min-width: 350px;
        }

        .online-count {
            text-align: center;
            color: #4f4;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .online-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .online-player {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .online-player .dot {
            width: 8px;
            height: 8px;
            background: #4f4;
            border-radius: 50%;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: #e94560; border-radius: 3px; }

        /* 通知 */
        .notification {
            position: absolute;
            top: 60px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ffd700;
            border-radius: 8px;
            padding: 12px 20px;
            z-index: 200;
            animation: slideIn 0.3s, fadeOut 0.3s 2.7s;
            max-width: 300px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .minimap {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ffd700;
            border-radius: 8px;
            z-index: 8;
        }

        .minimap-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffd700;
            border-radius: 50%;
        }

        .minimap-dot.player { background: #4f4; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 登录/注册界面 -->
        <div id="auth-screen">
            <h1>问道MMO</h1>
            <p class="subtitle">2D回合制MMORPG</p>
            
            <div class="auth-box" id="login-box">
                <h2>登录</h2>
                <div class="error-msg" id="login-error"></div>
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码">
                </div>
                <button class="btn-gold" onclick="doLogin()">登录</button>
                <button class="btn-link" onclick="showRegister()">没有账号？点击注册</button>
            </div>

            <div class="auth-box" id="register-box" style="display:none">
                <h2>注册</h2>
                <div class="success-msg" id="register-success"></div>
                <div class="error-msg" id="register-error"></div>
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" id="reg-username" placeholder="请输入用户名">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="reg-password" placeholder="请输入密码">
                </div>
                <button class="btn-gold" onclick="doRegister()">注册</button>
                <button class="btn-link" onclick="showLogin()">已有账号？点击登录</button>
            </div>
        </div>

        <!-- 门派选择界面 -->
        <div id="sect-screen">
            <h2>选择你的门派</h2>
            <div class="sect-grid" id="sect-grid"></div>
            <button class="btn-gold" style="margin-top:30px; width:200px" onclick="confirmSect()" id="sect-confirm" disabled>确认选择</button>
        </div>

        <!-- 主游戏界面 -->
        <div id="game-screen">
            <div id="top-bar">
                <div class="player-info">
                    <div class="player-avatar" id="avatar-icon">🦸</div>
                    <div>
                        <div class="player-name" id="top-name">勇者</div>
                        <div class="player-level" id="top-level">Lv.1</div>
                    </div>
                </div>
                <div class="resource-bar">
                    <div class="resource">
                        <span class="icon">❤️</span>
                        <span id="top-hp">100/100</span>
                    </div>
                    <div class="resource">
                        <span class="icon">💧</span>
                        <span id="top-mp">50/50</span>
                    </div>
                    <div class="resource">
                        <span class="icon">💰</span>
                        <span id="top-gold">1000</span>
                    </div>
                    <div class="resource">
                        <span class="icon">💎</span>
                        <span id="top-yuanbao">100</span>
                    </div>
                </div>
                <div style="flex:1"></div>
                <div style="color:#aaa; font-size:0.9em" id="online-count">在线: 1</div>
            </div>

            <div id="game-map" tabindex="0">
                <!-- 地图瓦片将在这里生成 -->
            </div>

            <div class="minimap" id="minimap">
                <div class="minimap-dot player" id="minimap-player"></div>
            </div>

            <div id="bottom-menu">
                <button class="menu-btn" onclick="showPanel('battle-panel')">⚔️ 战斗</button>
                <button class="menu-btn" onclick="showPanel('pet-panel')">🐾 宠物</button>
                <button class="menu-btn" onclick="showPanel('equip-panel')">🎒 装备</button>
                <button class="menu-btn" onclick="showPanel('skill-panel')">✨ 技能</button>
                <button class="menu-btn" onclick="showPanel('social-panel')">👥 社交</button>
                <button class="menu-btn" onclick="showPanel('chat-panel')">💬 聊天</button>
                <button class="menu-btn" onclick="showPanel('shop-panel')">🏪 商店</button>
                <button class="menu-btn" onclick="showPanel('online-panel')">📡 在线</button>
                <button class="menu-btn" onclick="showPanel('admin-panel')">🔧 管理</button>
            </div>
        </div>

        <!-- 战斗面板 -->
        <div class="panel" id="battle-panel">
            <button class="panel-close" onclick="closePanel('battle-panel')">×</button>
            <h2>⚔️ 回合制战斗</h2>
            <div class="battle-field">
                <div class="battle-fighter" id="battle-player">
                    <div class="battle-sprite" id="battle-player-sprite">🦸</div>
                    <div class="battle-name" id="battle-player-name">勇者</div>
                    <div class="battle-hp-bar"><div class="battle-hp-fill" id="battle-player-hp" style="width:100%"></div></div>
                </div>
                <div style="font-size:2em; color:#ffd700">VS</div>
                <div class="battle-fighter" id="battle-enemy">
                    <div class="battle-sprite" id="battle-enemy-sprite">👹</div>
                    <div class="battle-name" id="battle-enemy-name">野怪</div>
                    <div class="battle-hp-bar"><div class="battle-hp-fill" id="battle-enemy-hp" style="width:100%"></div></div>
                </div>
            </div>
            <div class="battle-actions" id="battle-actions">
                <button class="action-btn" onclick="battleAction('attack')">⚔️ 攻击</button>
                <button class="action-btn" onclick="battleAction('skill')">✨ 技能</button>
                <button class="action-btn" onclick="battleAction('defend')">🛡️ 防御</button>
                <button class="action-btn" onclick="battleAction('pet')">🐾 宠物</button>
            </div>
            <div class="battle-log" id="battle-log"></div>
            <button class="menu-btn" onclick="startBattle()" style="margin-top:15px;width:100%">🔄 新的战斗</button>
        </div>

        <!-- 宠物面板 -->
        <div class="panel" id="pet-panel">
            <button class="panel-close" onclick="closePanel('pet-panel')">×</button>
            <h2>🐾 宠物系统</h2>
            <div class="pet-list" id="pet-list">
                <div class="pet-card" style="text-align:center;padding:30px;color:#aaa">
                    加载中...
                </div>
            </div>
            <button class="menu-btn" onclick="showCatchPet()" style="margin-top:15px;width:100%">🎣 捕捉宠物</button>
        </div>

        <!-- 装备面板 -->
        <div class="panel" id="equip-panel">
            <button class="panel-close" onclick="closePanel('equip-panel')">×</button>
            <h2>🎒 装备系统</h2>
            <div id="equip-content">
                <p style="color:#aaa;text-align:center">加载中...</p>
            </div>
        </div>

        <!-- 技能面板 -->
        <div class="panel" id="skill-panel">
            <button class="panel-close" onclick="closePanel('skill-panel')">×</button>
            <h2>✨ 技能系统</h2>
            <div id="skill-content">
                <p style="color:#aaa;text-align:center">请先选择门派</p>
            </div>
        </div>

        <!-- 社交面板 -->
        <div class="panel" id="social-panel">
            <button class="panel-close" onclick="closePanel('social-panel')">×</button>
            <h2>👥 社交系统</h2>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
                <button class="menu-btn" onclick="alert('好友系统开发中...')">👫 好友列表</button>
                <button class="menu-btn" onclick="alert('公会系统开发中...')">🏰 公会</button>
                <button class="menu-btn" onclick="alert('婚姻系统开发中...')">💒 婚姻</button>
                <button class="menu-btn" onclick="alert('组队系统开发中...')">👥 组队</button>
            </div>
        </div>

        <!-- 聊天面板 -->
        <div class="panel" id="chat-panel">
            <button class="panel-close" onclick="closePanel('chat-panel')">×</button>
            <h2>💬 聊天</h2>
            <div class="chat-messages" id="chat-messages">
                <div style="color:#aaa">欢迎来到问道MMO！</div>
            </div>
            <div class="chat-input-group">
                <select id="chat-channel" style="padding:8px;border-radius:8px;background:#222;color:#fff;border:2px solid #333">
                    <option value="world">世界</option>
                    <option value="guild">公会</option>
                    <option value="team">组队</option>
                    <option value="private">私聊</option>
                </select>
                <input type="text" id="chat-input" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendChat()">
                <button class="btn-gold" onclick="sendChat()" style="width:80px;padding:10px">发送</button>
            </div>
        </div>

        <!-- 商店面板 -->
        <div class="panel" id="shop-panel">
            <button class="panel-close" onclick="closePanel('shop-panel')">×</button>
            <h2>🏪 商店</h2>
            <div id="shop-content" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
                <div class="shop-item" onclick="buyItem('potion')">
                    <div style="font-size:2em">🧪</div>
                    <div>治疗药水</div>
                    <div style="color:#ffd700">💰 50</div>
                </div>
                <div class="shop-item" onclick="buyItem('mp_potion')">
                    <div style="font-size:2em">💧</div>
                    <div>魔力药水</div>
                    <div style="color:#ffd700">💰 60</div>
                </div>
                <div class="shop-item" onclick="buyItem('sword')">
                    <div style="font-size:2em">⚔️</div>
                    <div>铁剑</div>
                    <div style="color:#ffd700">💰 500</div>
                </div>
                <div class="shop-item" onclick="buyItem('armor')">
                    <div style="font-size:2em">🛡️</div>
                    <div>布甲</div>
                    <div style="color:#ffd700">💰 400</div>
                </div>
            </div>
        </div>

        <!-- 在线玩家面板 -->
        <div class="panel" id="online-panel">
            <button class="panel-close" onclick="closePanel('online-panel')">×</button>
            <h2>📡 在线玩家</h2>
            <div class="online-count" id="online-count-panel">当前在线: 1</div>
            <div class="online-list" id="online-list">
                <div style="color:#aaa;text-align:center">加载中...</div>
            </div>
        </div>

        <!-- 管理面板 -->
        <div class="panel" id="admin-panel">
            <button class="panel-close" onclick="closePanel('admin-panel')">×</button>
            <h2>🔧 管理后台</h2>
            <div style="display:grid;gap:10px">
                <button class="menu-btn" onclick="adminAction('add_gold')">💰 增加金币 (1000)</button>
                <button class="menu-btn" onclick="adminAction('add_exp')">⭐ 增加经验 (500)</button>
                <button class="menu-btn" onclick="adminAction('heal')">💚 恢复生命</button>
                <button class="menu-btn" onclick="adminAction('level_up')">🌟 升级</button>
                <button class="menu-btn" onclick="showLeaderboard()">🏆 排行榜</button>
                <button class="menu-btn" onclick="showMarket()">🏪 拍卖行</button>
            </div>
            <div id="admin-result" style="margin-top:15px;color:#aaa"></div>
        </div>
    </div>

    <script>
        // ============ 游戏核心变量 ============
        let ws = null;
        let currentPlayer = null;
        let selectedSect = null;
        let gameData = null;
        let playerX = 100, playerY = 100;
        let currentMap = 'newbie';
        let battleState = null;

        const SECTS = {
            '金': { icon: '⚔️', name: '金系', color: '#FFD700', desc: '物理攻击强，防御高', stats: { atk: 15, def: 8, hp: 120, spd: 6, matk: 5 } },
            '木': { icon: '🌿', name: '木系', color: '#00FF00', desc: '擅长治疗和辅助', stats: { atk: 8, def: 6, hp: 100, spd: 7, matk: 12 } },
            '水': { icon: '💧', name: '水系', color: '#00BFFF', desc: '控制技能强，速度最快', stats: { atk: 7, def: 5, hp: 90, spd: 12, matk: 10 } },
            '火': { icon: '🔥', name: '火系', color: '#FF4500', desc: '法术攻击强，爆发高', stats: { atk: 6, def: 4, hp: 85, spd: 10, matk: 18 } },
            '土': { icon: '⛰️', name: '土系', color: '#8B4513', desc: '血厚防高，擅长坦克', stats: { atk: 10, def: 12, hp: 150, spd: 5, matk: 6 } }
        };

        const PET_TYPES = [
            { type: '木', name: '小精灵', icon: '🧚', baseHp: 80, baseAtk: 12, baseDef: 8, baseSpd: 10 },
            { type: '火', name: '火麒麟', icon: '🔥', baseHp: 90, baseAtk: 18, baseDef: 6, baseSpd: 12 },
            { type: '水', name: '水晶龟', icon: '🐢', baseHp: 120, baseAtk: 8, baseDef: 15, baseSpd: 5 },
            { type: '金', name: '金角虫', icon: '🐛', baseHp: 70, baseAtk: 20, baseDef: 10, baseSpd: 8 },
            { type: '土', name: '石巨人', icon: '🗿', baseHp: 150, baseAtk: 15, baseDef: 20, baseSpd: 3 },
            { type: '火', name: '九尾狐', icon: '🦊', baseHp: 100, baseAtk: 22, baseDef: 8, baseSpd: 15 }
        ];

        // ============ 初始化 ============
        function init() {
            renderSectGrid();
            // 自动连接WebSocket
            connectWebSocket();
        }

        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${location.host}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('✅ WebSocket连接成功');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            };

            ws.onclose = () => {
                console.log('❌ WebSocket连接断开，3秒后重连...');
                setTimeout(connectWebSocket, 3000);
            };
        }

        function handleServerMessage(data) {
            switch (data.type) {
                case 'login_success':
                    currentPlayer = data.player;
                    gameData = data;
                    onLoginSuccess();
                    break;
                case 'login_fail':
                    showError('login-error', data.message);
                    break;
                case 'register_success':
                    showSuccess('register-success', data.message);
                    break;
                case 'register_fail':
                    showError('register-error', data.message);
                    break;
                case 'create_success':
                    currentPlayer = data.player;
                    gameData = data;
                    onCharacterCreated();
                    break;
                case 'game_data':
                    updateGameUI(data);
                    break;
                case 'battle_result':
                    handleBattleResult(data);
                    break;
                case 'catch_success':
                    addNotification('🎉 捕捉成功！获得宠物: ' + data.pet.name);
                    loadPets();
                    break;
                case 'chat_message':
                    addChatMessage(data);
                    break;
                case 'player_join':
                case 'player_leave':
                    updateOnlineCount(data.onlineCount);
                    break;
            }
        }

        // ============ 认证系统 ============
        function showRegister() {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('register-box').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('register-box').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
        }

        function doRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            if (!username || !password) {
                showError('register-error', '请输入用户名和密码');
                return;
            }
            ws.send(JSON.stringify({ type: 'register', username, password }));
        }

        function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if (!username || !password) {
                showError('login-error', '请输入用户名和密码');
                return;
            }
            ws.send(JSON.stringify({ type: 'login', username, password }));
        }

        function onLoginSuccess() {
            document.getElementById('auth-screen').style.display = 'none';
            
            if (!currentPlayer.sect) {
                // 需要选择门派
                document.getElementById('sect-screen').style.display = 'flex';
            } else {
                enterGame();
            }
        }

        // ============ 门派选择 ============
        function renderSectGrid() {
            const grid = document.getElementById('sect-grid');
            grid.innerHTML = '';
            Object.entries(SECTS).forEach(([key, sect]) => {
                const card = document.createElement('div');
                card.className = 'sect-card';
                card.innerHTML = `
                    <div class="sect-icon">${sect.icon}</div>
                    <div class="sect-name" style="color:${sect.color}">${sect.name}</div>
                    <div class="sect-desc">${sect.desc}</div>
                    <div class="sect-stats">
                        ⚔️${sect.stats.atk} 🛡️${sect.stats.def} ❤️${sect.stats.hp}<br>
                        💨${sect.stats.spd} ✨${sect.stats.matk}
                    </div>
                `;
                card.onclick = () => selectSect(key, card);
                grid.appendChild(card);
            });
        }

        function selectSect(sect, card) {
            document.querySelectorAll('.sect-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedSect = sect;
            document.getElementById('sect-confirm').disabled = false;
        }

        function confirmSect() {
            if (!selectedSect || !currentPlayer) return;
            ws.send(JSON.stringify({
                type: 'create_character',
                playerId: currentPlayer.id,
                sect: selectedSect
            }));
        }

        function onCharacterCreated() {
            document.getElementById('sect-screen').style.display = 'none';
            enterGame();
        }

        // ============ 游戏主逻辑 ============
        function enterGame() {
            document.getElementById('game-screen').style.display = 'block';
            updatePlayerUI();
            generateMap();
            spawnPlayer();
            ws.send(JSON.stringify({ type: 'get_game_data', playerId: currentPlayer.id }));
            addNotification('🎉 欢迎来到问道MMO！');
        }

        function updatePlayerUI() {
            if (!currentPlayer) return;
            document.getElementById('top-name').textContent = currentPlayer.username;
            document.getElementById('top-level').textContent = `Lv.${currentPlayer.level}`;
            document.getElementById('top-hp').textContent = `${currentPlayer.hp}/${currentPlayer.maxHp}`;
            document.getElementById('top-mp').textContent = `${currentPlayer.mp}/${currentPlayer.maxMp}`;
            document.getElementById('top-gold').textContent = currentPlayer.gold;
            document.getElementById('top-yuanbao').textContent = currentPlayer.yuanbao;
            document.getElementById('avatar-icon').textContent = SECTS[currentPlayer.sect] ? SECTS[currentPlayer.sect].icon : '🦸';
        }

        function updateGameUI(data) {
            // 更新宠物列表
            if (data.pets) renderPets(data.pets);
            // 更新装备
            if (data.equipment) renderEquipment(data.equipment);
            // 更新技能
            if (data.skills) renderSkills(data.skills);
        }

        // ============ 地图系统 ============
        function generateMap() {
            const map = document.getElementById('game-map');
            map.innerHTML = '';
            
            const width = 60;
            const height = 45;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const tile = document.createElement('div');
                    tile.className = 'map-tile';
                    // 随机生成不同地形
                    const rand = Math.random();
                    if (rand < 0.1) tile.classList.add('water');
                    else if (rand < 0.2) tile.classList.add('mountain');
                    else if (rand < 0.35) tile.classList.add('tree');
                    
                    tile.style.left = (x * 40) + 'px';
                    tile.style.top = (y * 40) + 'px';
                    map.appendChild(tile);
                }
            }

            // 添加NPC
            const npcs = [
                { icon: '🏪', x: 200, y: 200, name: '商店老板' },
                { icon: '🎓', x: 400, y: 300, name: '导师' },
                { icon: '🐾', x: 600, y: 200, name: '宠物大师' },
                { icon: '🏰', x: 300, y: 500, name: '公会管理员' }
            ];

            npcs.forEach(npc => {
                const el = document.createElement('div');
                el.className = 'npc-sprite';
                el.innerHTML = npc.icon;
                el.style.left = npc.x + 'px';
                el.style.top = npc.y + 'px';
                el.title = npc.name;
                map.appendChild(el);
            });
        }

        function spawnPlayer() {
            const map = document.getElementById('game-map');
            let existing = document.getElementById('player-sprite-el');
            if (existing) existing.remove();

            const el = document.createElement('div');
            el.className = 'player-sprite';
            el.id = 'player-sprite-el';
            el.innerHTML = SECTS[currentPlayer.sect] ? SECTS[currentPlayer.sect].icon : '🦸';
            el.style.left = playerX + 'px';
            el.style.top = playerY + 'px';
            map.appendChild(el);

            // 键盘控制
            document.getElementById('game-map').focus();
            document.getElementById('game-map').onkeydown = handleKeyPress;
        }

        function handleKeyPress(e) {
            const speed = 20;
            let moved = false;
            switch (e.key) {
                case 'w': case 'ArrowUp': playerY -= speed; moved = true; break;
                case 's': case 'ArrowDown': playerY += speed; moved = true; break;
                case 'a': case 'ArrowLeft': playerX -= speed; moved = true; break;
                case 'd': case 'ArrowRight': playerX += speed; moved = true; break;
            }
            if (moved) {
                e.preventDefault();
                playerX = Math.max(0, Math.min(2360, playerX));
                playerY = Math.max(0, Math.min(1760, playerY));
                
                const el = document.getElementById('player-sprite-el');
                if (el) {
                    el.style.left = playerX + 'px';
                    el.style.top = playerY + 'px';
                }

                // 更新小地图
                updateMinimap();

                // 发送给服务器
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'move',
                        playerId: currentPlayer.id,
                        x: playerX,
                        y: playerY,
                        map: currentMap
                    }));
                }
            }
        }

        function updateMinimap() {
            const dot = document.getElementById('minimap-player');
            dot.style.left = (playerX / 16) + 'px';
            dot.style.top = (playerY / 16) + 'px';
        }

        // ============ 战斗系统 ============
        function startBattle() {
            const enemy = generateEnemy();
            battleState = {
                playerHp: currentPlayer.hp,
                enemyHp: enemy.hp,
                enemy: enemy,
                turn: 'player'
            };

            document.getElementById('battle-enemy-sprite').textContent = enemy.icon;
            document.getElementById('battle-enemy-name').textContent = enemy.name;
            updateBattleUI();
            addBattleLog('⚔️ 遭遇了 ' + enemy.name + '！');
            showPanel('battle-panel');
        }

        function generateEnemy() {
            const enemies = [
                { name: '哥布林', icon: '👺', hp: 60, atk: 12 },
                { name: '骷髅兵', icon: '💀', hp: 80, atk: 15 },
                { name: '史莱姆', icon: '🟢', hp: 50, atk: 10 },
                { name: '狼人', icon: '🐺', hp: 90, atk: 18 },
                { name: '巫师', icon: '🧙', hp: 70, atk: 22 }
            ];
            const base = enemies[Math.floor(Math.random() * enemies.length)];
            const scaling = 1 + (currentPlayer.level - 1) * 0.2;
            return {
                ...base,
                hp: Math.floor(base.hp * scaling),
                maxHp: Math.floor(base.hp * scaling),
                atk: Math.floor(base.atk * scaling)
            };
        }

        function battleAction(action) {
            if (!battleState || battleState.turn !== 'player') return;

            const enemy = battleState.enemy;
            let log = '';

            switch (action) {
                case 'attack':
                    const dmg = Math.floor(Math.random() * 15) + currentPlayer.atk;
                    battleState.enemyHp -= dmg;
                    log = `⚔️ 你攻击了${enemy.name}，造成 ${dmg} 点伤害！`;
                    break;
                case 'skill':
                    const skillDmg = Math.floor(Math.random() * 25) + currentPlayer.matk + 10;
                    battleState.enemyHp -= skillDmg;
                    log = `✨ 你释放了技能，造成 ${skillDmg} 点魔法伤害！`;
                    break;
                case 'defend':
                    log = `🛡️ 你进入防御姿态！`;
                    break;
                case 'pet':
                    log = `🐾 宠物冲了上去！`;
                    const petDmg = Math.floor(Math.random() * 20) + 10;
                    battleState.enemyHp -= petDmg;
                    break;
            }

            addBattleLog(log);
            updateBattleUI();

            if (battleState.enemyHp <= 0) {
                addBattleLog('🎉 胜利！获得经验和金币！');
                // 发送战斗结果到服务器
                ws.send(JSON.stringify({
                    type: 'battle_action',
                    playerId: currentPlayer.id,
                    action: 'win'
                }));
                setTimeout(() => closePanel('battle-panel'), 1500);
                return;
            }

            // 敌人回合
            battleState.turn = 'enemy';
            setTimeout(() => {
                const enemyDmg = Math.floor(Math.random() * 10) + enemy.atk;
                battleState.playerHp -= enemyDmg;
                addBattleLog(`👹 ${enemy.name} 攻击了你，造成 ${enemyDmg} 点伤害！`);
                updateBattleUI();

                if (battleState.playerHp <= 0) {
                    addBattleLog('💀 你被击败了...');
                    setTimeout(() => closePanel('battle-panel'), 1500);
                    return;
                }

                battleState.turn = 'player';
                addBattleLog('--- 你的回合 ---');
            }, 1000);
        }

        function updateBattleUI() {
            if (!battleState) return;
            const enemyHpPct = Math.max(0, (battleState.enemyHp / battleState.enemy.maxHp) * 100);
            document.getElementById('battle-enemy-hp').style.width = enemyHpPct + '%';
        }

        function addBattleLog(msg) {
            const log = document.getElementById('battle-log');
            const div = document.createElement('div');
            div.textContent = msg;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function handleBattleResult(data) {
            if (data.expGain) {
                currentPlayer.exp += data.expGain;
                currentPlayer.gold += data.goldGain;
                addNotification(`⭐ 获得 ${data.expGain} 经验，${data.goldGain} 金币`);
                updatePlayerUI();
            }
        }

        // ============ 宠物系统 ============
        function renderPets(pets) {
            const list = document.getElementById('pet-list');
            if (!pets || pets.length === 0) {
                list.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#aaa;padding:30px">还没有宠物，去捕捉吧！</div>';
                return;
            }
            list.innerHTML = pets.map(pet => `
                <div class="pet-card ${pet.isBattle ? 'battle' : ''}" onclick="togglePetBattle('${pet.id}')">
                    <div class="pet-icon">🐾</div>
                    <div style="font-weight:bold">${pet.name}</div>
                    <div style="font-size:0.85em;color:#aaa">Lv.${pet.level} | ${pet.type}系</div>
                    <div style="font-size:0.8em;margin-top:5px">
                        ❤️${pet.hp} ⚔️${pet.atk} 🛡️${pet.def}
                    </div>
                    ${pet.isBattle ? '<div style="color:#4f4;font-size:0.8em;margin-top:5px">🐾 出战中</div>' : ''}
                </div>
            `).join('');
        }

        function loadPets() {
            // 从服务器重新加载
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'get_game_data', playerId: currentPlayer.id }));
            }
        }

        function showCatchPet() {
            const pet = PET_TYPES[Math.floor(Math.random() * PET_TYPES.length)];
            if (confirm(`发现了一只${pet.icon} ${pet.name}！\n是否捕捉？`)) {
                ws.send(JSON.stringify({
                    type: 'catch_pet',
                    playerId: currentPlayer.id,
                    petType: pet.type
                }));
            }
        }

        function togglePetBattle(petId) {
            addNotification('🐾 宠物出战设置已更新！');
        }

        // ============ 装备系统 ============
        function renderEquipment(equipment) {
            const content = document.getElementById('equip-content');
            content.innerHTML = `
                <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
                    <div class="shop-item">
                        <div style="font-size:2em">⚔️</div>
                        <div>武器</div>
                        <div style="color:#aaa;font-size:0.85em">攻击 +${currentPlayer.atk}</div>
                    </div>
                    <div class="shop-item">
                        <div style="font-size:2em">🛡️</div>
                        <div>防具</div>
                        <div style="color:#aaa;font-size:0.85em">防御 +${currentPlayer.def}</div>
                    </div>
                    <div class="shop-item">
                        <div style="font-size:2em">💍</div>
                        <div>饰品</div>
                        <div style="color:#aaa;font-size:0.85em">速度 +${currentPlayer.spd}</div>
                    </div>
                    <div class="shop-item">
                        <div style="font-size:2em">👟</div>
                        <div>鞋子</div>
                        <div style="color:#aaa;font-size:0.85em">速度 +${currentPlayer.spd}</div>
                    </div>
                </div>
                <button class="menu-btn" style="margin-top:15px;width:100%" onclick="alert('强化系统开发中...')">⚒️ 强化装备</button>
            `;
        }

        // ============ 技能系统 ============
        function renderSkills(skills) {
            const content = document.getElementById('skill-content');
            if (!skills || skills.length === 0) {
                content.innerHTML = '<p style="color:#aaa;text-align:center">请先选择门派</p>';
                return;
            }
            content.innerHTML = skills.map(sk => `
                <div class="shop-item" style="margin-bottom:10px">
                    <div style="font-weight:bold;color:#ffd700">${sk.name}</div>
                    <div style="font-size:0.85em;color:#aaa;margin:5px 0">${sk.desc}</div>
                    <div style="font-size:0.8em">
                        ${sk.mp ? `💧 MP: ${sk.mp}` : ''}
                        ${sk.dmg ? ` | ⚔️ 伤害: ${sk.dmg}x` : ''}
                        ${sk.value ? ` | 📊 效果: ${sk.value}` : ''}
                    </div>
                </div>
            `).join('');
        }

        // ============ 聊天系统 ============
        function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;

            const channel = document.getElementById('chat-channel').value;
            ws.send(JSON.stringify({
                type: 'chat',
                playerId: currentPlayer.id,
                message: msg,
                channel: channel
            }));

            input.value = '';
        }

        function addChatMessage(data) {
            const messages = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.innerHTML = `<span style="color:#88f">[${data.channel}]</span> <b>${data.playerName}</b>: ${data.message}`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // ============ 商店系统 ============
        function buyItem(itemId) {
            const prices = {
                'potion': 50,
                'mp_potion': 60,
                'sword': 500,
                'armor': 400
            };
            const names = {
                'potion': '治疗药水',
                'mp_potion': '魔力药水',
                'sword': '铁剑',
                'armor': '布甲'
            };
            if (currentPlayer.gold < prices[itemId]) {
                addNotification('❌ 金币不足！');
                return;
            }
            currentPlayer.gold -= prices[itemId];
            updatePlayerUI();
            addNotification(`🛒 购买了 ${names[itemId]}！`);
        }

        // ============ 管理后台 ============
        function adminAction(action) {
            const result = document.getElementById('admin-result');
            switch (action) {
                case 'add_gold':
                    currentPlayer.gold += 1000;
                    result.innerHTML = '✅ 已增加 1000 金币';
                    break;
                case 'add_exp':
                    currentPlayer.exp += 500;
                    result.innerHTML = '✅ 已增加 500 经验';
                    break;
                case 'heal':
                    currentPlayer.hp = currentPlayer.maxHp;
                    currentPlayer.mp = currentPlayer.maxMp;
                    result.innerHTML = '✅ 已恢复生命和魔力';
                    break;
                case 'level_up':
                    currentPlayer.level++;
                    result.innerHTML = `✅ 已升级到 Lv.${currentPlayer.level}`;
                    break;
            }
            updatePlayerUI();
            setTimeout(() => result.innerHTML = '', 3000);
        }

        function showLeaderboard() {
            fetch('/api/leaderboard')
                .then(r => r.json())
                .then(data => {
                    const text = data.leaderboard.map((p, i) =>
                        `${i + 1}. ${p.username} (${p.sect}) Lv.${p.level}`
                    ).join('\n');
                    alert('🏆 排行榜\n\n' + text);
                });
        }

        function showMarket() {
            fetch('/api/market')
                .then(r => r.json())
                .then(data => {
                    const text = data.items.map(i => `${i.name} - ${i.price} 金币`).join('\n');
                    alert('🏪 拍卖行\n\n' + text);
                });
        }

        // ============ UI工具函数 ============
        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function closePanel(id) {
            document.getElementById(id).style.display = 'none';
        }

        function showError(elementId, msg) {
            const el = document.getElementById(elementId);
            el.textContent = msg;
            setTimeout(() => el.textContent = '', 3000);
        }

        function showSuccess(elementId, msg) {
            const el = document.getElementById(elementId);
            el.textContent = msg;
            setTimeout(() => el.textContent = '', 3000);
        }

        function addNotification(msg) {
            const container = document.getElementById('game-container');
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            container.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        function updateOnlineCount(count) {
            document.getElementById('online-count').textContent = `在线: ${count}`;
            document.getElementById('online-count-panel').textContent = `当前在线: ${count}`;
        }

        // ============ 启动 ============
        window.onload = init;
    </script>
</body>
</html>
